name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux audio deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - run: cargo test --workspace --all-features

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses advisories sources

  d15-invariant:
    name: D15 — daemon has no visualiser/tui deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - name: Assert clitunesd depgraph is clean
        run: |
          set -euo pipefail
          if cargo tree -e features -p clitunesd | grep -qE 'wgpu|ratatui|crossterm'; then
            echo "::error::D15 violated: clitunesd depends on a visualiser/tui crate"
            cargo tree -e features -p clitunesd | grep -E 'wgpu|ratatui|crossterm'
            exit 1
          fi
          echo "D15 holds — clitunesd has no wgpu/ratatui/crossterm in its dep graph."
      - name: Assert image crate excluded from daemon (D15 — album-art is client-only)
        run: |
          set -euo pipefail
          if cargo tree -p clitunesd | grep -qE '^[| ]*image v'; then
            echo "::error::D15 violated: image crate found in clitunesd dep graph"
            cargo tree -p clitunesd | grep -E 'image v'
            exit 1
          fi
          echo "D15 holds — image crate excluded from daemon."
      - name: Assert librespot excluded from non-spotify builds
        run: |
          set -euo pipefail
          if cargo tree -p clitunesd --no-default-features --features radio,local,audio,decode 2>/dev/null | grep -qE 'librespot'; then
            echo "::error::D15 violated: librespot appears without spotify feature"
            cargo tree -p clitunesd --no-default-features --features radio,local,audio,decode | grep -E 'librespot'
            exit 1
          fi
          echo "D15 holds — librespot excluded from non-spotify builds."
