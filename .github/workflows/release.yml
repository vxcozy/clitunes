name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04  # glibc 2.35 floor for Debian 12 / RHEL 9 compat
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm  # native arm64 runner — no cross-compile

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: release-${{ matrix.target }}

      - name: Install Linux audio deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Build release binaries
        run: |
          cargo build --release --target ${{ matrix.target }} -p clitunes
          cargo build --release --target ${{ matrix.target }} -p clitunesd --features connect

      - name: Strip binaries
        run: |
          strip target/${{ matrix.target }}/release/clitunes
          strip target/${{ matrix.target }}/release/clitunesd

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - target/${{ matrix.target }}/release/clitunes
          codesign --force --deep --sign - target/${{ matrix.target }}/release/clitunesd
          codesign -dv --verbose=2 target/${{ matrix.target }}/release/clitunes 2>&1 | grep -i 'Signature=adhoc'

      - name: Package
        env:
          TARGET: ${{ matrix.target }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="clitunes-${TAG}-${TARGET}.tar.gz"
          tar -czf "$ARCHIVE" \
            -C "target/${TARGET}/release" \
            clitunes clitunesd
          shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: clitunes-${{ matrix.target }}
          path: |
            clitunes-*.tar.gz
            clitunes-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        env:
          REF: ${{ github.ref }}
        run: |
          TAG="${REF#refs/tags/}"
          VERSION="${TAG#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { flag=1; next }
            /^## \[/ && flag { flag=0 }
            flag
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::release-notes.md is empty — CHANGELOG.md has no [$VERSION] section"
            exit 1
          fi
          echo "=== release-notes.md ($(wc -l < release-notes.md) lines) ==="
          cat release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.ref }}
        run: |
          TAG="${REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            artifacts/clitunes-*.tar.gz \
            artifacts/clitunes-*.tar.gz.sha256
