# cargo-deny config for clitunes.
#
# Licence policy: MIT + Apache-2.0 ecosystem. Keep the allow list conservative
# so any new license shows up as a CI failure and gets a human review.

[graph]
targets = [
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]
all-features = false

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
    "MIT-0",
    # webpki-roots 1.0.6 ships Mozilla's CA trust list under CDLA-Permissive-2.0.
    # Pure data, permissive, no copyleft — fine to redistribute in binaries.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

# webpki 0.22.4 is ISC-licensed but has no machine-readable license field;
# cargo-deny's text scanner only scores 0.85 (below threshold). Transitive dep
# of librespot via hyper-proxy2. Safe to allow explicitly.
[[licenses.clarify]]
name = "webpki"
version = "0.22.4"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

[bans]
multiple-versions = "allow"
wildcards = "warn"
# Intra-workspace path deps don't carry a version and trip the wildcard check.
allow-wildcard-paths = true
# D15: the daemon binary must never pull the visualiser/tui deps. Enforced in
# CI via `cargo tree -p clitunesd` grep; cargo-deny is a second line of defence
# that runs on the full workspace tree.
deny = []

[advisories]
version = 2
yanked = "warn"
ignore = [
    # RUSTSEC-2024-0436: `paste` is unmaintained. Now comes in via lofty (tag
    # reader), not ratatui. No safe upgrade available at the leaf — lofty pins it.
    # Pure proc-macro, no runtime risk. Re-evaluate when lofty drops the dep.
    "RUSTSEC-2024-0436",
    # librespot transitive deps — cannot upgrade independently. Re-evaluate
    # when librespot releases a version that updates these.
    # rsa 0.9.x: Marvin timing attack. librespot uses it for Spotify auth
    # handshake over TLS — not exposed to external timing observation.
    "RUSTSEC-2023-0071",
    # rustls-pemfile: unmaintained. Transitive via librespot → hyper-rustls.
    "RUSTSEC-2025-0134",
    # webpki CRL matching bug. Not relevant — we don't use CRL checking.
    "RUSTSEC-2026-0049",
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-git = [
    # librespot dev branch: patched to fix vergen-gitcl build conflict.
    # Remove when librespot publishes a release with the fix.
    "https://github.com/librespot-org/librespot",
]
