# cargo-deny config for clitunes.
#
# Licence policy: MIT + Apache-2.0 ecosystem. Keep the allow list conservative
# so any new license shows up as a CI failure and gets a human review.

[graph]
targets = [
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]
all-features = false

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
    "MIT-0",
    # webpki-roots 1.0.6 ships Mozilla's CA trust list under CDLA-Permissive-2.0.
    # Pure data, permissive, no copyleft — fine to redistribute in binaries.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "allow"
wildcards = "warn"
# Intra-workspace path deps don't carry a version and trip the wildcard check.
allow-wildcard-paths = true
# D15: the daemon binary must never pull the visualiser/tui deps. Enforced in
# CI via `cargo tree -p clitunesd` grep; cargo-deny is a second line of defence
# that runs on the full workspace tree.
deny = []

[advisories]
version = 2
yanked = "warn"
ignore = [
    # RUSTSEC-2024-0436: `paste` is unmaintained. Comes in transitively via
    # ratatui 0.29 → paste 1.0.15. No safe upgrade available at the leaf.
    # Track upstream: https://github.com/ratatui-org/ratatui/issues and
    # re-evaluate when ratatui drops the dep or migrates to `pastey`.
    "RUSTSEC-2024-0436",
    # RUSTSEC-2026-0002: `lru` < 0.16.3 has an IterMut soundness issue
    # (Stacked Borrows violation). Severity: low (CVSS 2.7). Comes in
    # transitively via ratatui 0.29 → lru 0.12.5. Fixed in lru 0.16.3, but
    # ratatui 0.29 pins the old major. Resolving requires upgrading to
    # ratatui 0.30 (subcrate split rewrite — non-trivial migration). We don't
    # use ratatui's IterMut code paths ourselves, so impact is nil. Revisit
    # alongside the ratatui 0.30 upgrade.
    "RUSTSEC-2026-0002",
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
