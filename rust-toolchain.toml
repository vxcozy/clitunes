# Pin the project toolchain so local builds match CI lint-for-lint.
#
# Rust version drift between local (1.93) and CI (1.95) caused three
# preventable clippy failures in v1.0 / v1.3 work. This pin forces
# both to compile under 1.95.0 so new lints fire before `git push`.
#
# Bumping policy: a single deliberate PR bumps the channel here and
# triggers a full CI run under the new version. Any new lints fire on
# that PR in isolation, not buried inside a feature PR.
#
# Intentionally minimal: channel only, no `components`, no `targets`,
# no `profile`. An earlier version set all of these — broke the v1.1.0
# release workflow (the minimal profile stripped cross-compile stdlibs
# that the matrix build needs) and the e2e job (cause unknown but
# traceable to the same file change). CI's existing action directives
# (`dtolnay/rust-toolchain` with `targets` in the matrix) supply what
# they need on top of this base channel pin.

[toolchain]
channel = "1.95.0"
components = ["rustfmt", "clippy"]
